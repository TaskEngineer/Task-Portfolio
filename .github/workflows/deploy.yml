# .github/workflows/deploy.yml
name: Deploy to AWS (S3 + CloudFront)

on:
  push:
    branches:
      - main
  workflow_dispatch:  # Actionsタブから手動実行できるように

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # Step1: リポジトリのコードを取得
      - name: Checkout
        uses: actions/checkout@v4

      # Step2: Node.jsセットアップ（frontendディレクトリのpackage-lock.jsonをキャッシュキーに使う）
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # Step3: frontendの依存関係をインストール
      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      # Step4: AWS認証情報を設定
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-1

      # Step5: deploy.sh に実行権限を付与（gitクローン後はパーミッションが落ちる場合がある）
      - name: Grant execute permission
        run: chmod +x ./deploy.sh

      # Step6: deploy.sh実行（.envの代わりに環境変数を直接注入）
      - name: Run deploy.sh
        run: ./deploy.sh --wait
        env:
          BUCKET_NAME: ${{ secrets.BUCKET_NAME }}
          DISTRIBUTION_ID: ${{ secrets.DISTRIBUTION_ID }}